# ABOUTME: Minimal Hugo config for regression testing the tadg_ie theme
# ABOUTME: Exercises video shortcode with Cloudflare Stream config

baseURL: https://test.example.com/
title: Test Site
theme: tadg_ie

params:
  cloudflareStream:
    customerCode: "TESTCODE"

security:
  funcs:
    # CF vars must be listed so Hugo permits the os.Getenv call in the partial.
    # Real API calls don't happen in tests because the vars are not set in the test environment.
    getenv:
      - ^HUGO_
      - ^CI$
      - ^CLOUDFLARE_API_TOKEN$
      - ^CLOUDFLARE_ACCOUNT_ID$
