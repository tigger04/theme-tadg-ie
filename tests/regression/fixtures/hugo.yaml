# ABOUTME: Minimal Hugo config for regression testing the tadg_ie theme
# ABOUTME: Exercises video shortcode with Cloudflare Stream config

baseURL: https://test.example.com/
title: Test Site
theme: tadg_ie

params:
  cloudflareStream:
    customerCode: "TESTCODE"

# No security.funcs.getenv override needed — the partial's CF API branch requires
# params.cloudflareStream.apiLookup: true, which is not set here, so os.Getenv
# is never called and real API calls cannot happen regardless of the shell environment.
