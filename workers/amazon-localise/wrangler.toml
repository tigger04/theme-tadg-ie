# ABOUTME: Wrangler configuration for the amazon-localise Cloudflare Worker.
# ABOUTME: Rewrites Amazon product links at the edge to the visitor's local Amazon market.

name = "amazon-localise"
main = "src/index.js"
compatibility_date = "2026-04-10"

# Routes are not configured here, to keep this worker reusable across consuming sites.
# After first deploy, configure routes in the Cloudflare dashboard:
#   Workers & Pages → amazon-localise → Settings → Triggers → Add route
# Suggested patterns for a site like example.com:
#   example.com/*
#   *.example.com/*
